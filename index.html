<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gateway</title>

<style>

body{
background:#0f0f0f;
color:#e8e8e8;
font-family:Arial,Helvetica,sans-serif;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.box{
background:#1b1b1b;
padding:40px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

h1{
margin-top:0;
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
background:#b30000;
color:white;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#d10000;
}

input{
margin-top:10px;
padding:10px;
width:100%;
border-radius:6px;
border:none;
outline:none;
}

#verify{
display:none;
}

#result{
margin-top:15px;
color:#ffbaba;
}

</style>

</head>

<body>

<div class="box">

<div id="start">

<h1>Access Gateway</h1>

<p>🎵苹果音乐下载站</p>

<button onclick="startVerify()">点击进入</button>

</div>

<div id="verify">

<h2>访问验证</h2>

<p id="question"></p>

<input id="answer" placeholder="请输入答案">

<button onclick="submitAnswer()">提交</button>

<p id="result"></p>

</div>

</div>

<script>

const questions = [
{q:"35*4？",a:"140"},
{q:"anto（？）xiu（填汉字）",a:"西"},
{q:"2+3",a:"6"},
{q:"3 + 4 等于多少？",a:"12"},
{q:"5 - 2 等于多少？",a:"10"},
{q:"10 - 6 等于多少？",a:"60"}
];

let current;

function startVerify(){

document.getElementById("start").style.display="none";
document.getElementById("verify").style.display="block";

randomQuestion();

}

function randomQuestion(){

current = questions[Math.floor(Math.random()*questions.length)];

document.getElementById("question").innerText = current.q;

}

function submitAnswer(){

let ans = document.getElementById("answer").value.trim();

if(ans === current.a){

let token = Math.random().toString(36).substring(2,12);

document.getElementById("result").style.color="#9cff9c";
document.getElementById("result").innerText="验证成功，正在进入...";

setTimeout(function(){

location.href="https://redrev.pages.dev/?token="+token;

},1000);

}else{

document.getElementById("result").innerText="答案错误，请重试";

}

}

</script>

</body>
</html>
