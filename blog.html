<!DOCTYPE html>
<html lang="zh">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>博客</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

:root{
--red:#b30000;
--lightred:#ffd6d6;
}

body{
margin:0;
font-family:"Noto Sans SC",sans-serif;
background:var(--lightred);
color:#222;
overflow-x:hidden;
}

/* 红星背景 */

.star-bg{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120vw;
color:#ffd700;
opacity:0.08;
z-index:-1;
pointer-events:none;
}

/* 页面主体 */

.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* 返回按钮 */

.back{
margin-bottom:20px;
}

.back a{
color:#900;
text-decoration:none;
font-size:18px;
}

.back a:hover{
color:#b30000;
}

/* 栏目 */

.category{

background:white;
border-left:6px solid var(--red);
border-radius:8px;
padding:18px;
margin-bottom:18px;
cursor:pointer;

}

.category h2{
margin:0;
color:#8b0000;
}

/* 文章列表 */

.post-list{
display:none;
margin-top:12px;
}

.post-list a{
display:block;
padding:8px 0;
color:#333;
text-decoration:none;
}

.post-list a:hover{
color:#b30000;
}

/* 文章内容 */

#content{

background:white;
padding:25px;
border-radius:10px;
box-shadow:0 6px 18px rgba(0,0,0,0.15);
line-height:1.8;

}

.related{
margin-top:50px;
border-top:2px solid #b30000;
padding-top:20px;
}

img{
max-width:100%;
}

@media(max-width:600px){

.container{
padding:15px;
}

#content{
font-size:16px;
}

}

</style>

</head>

<body>

<div class="star-bg">★</div>

<div class="container">

<div class="back">
<a href="index.html">← 返回主页</a>
</div>

<div id="main"></div>

</div>

<script>

/* GitHub仓库 */

const repo="hepsa2/mlmpm";

/* 栏目 */

const categories={

A:{
title:"时事评论",
folder:"postsA"
},

B:{
title:"理论分析",
folder:"postsB"
},

C:{
title:"国际视野",
folder:"postsC"
}

};

const params=new URLSearchParams(location.search);

const cat=params.get("cat");
const post=params.get("post");

const main=document.getElementById("main");

/* 打开文章 */

if(cat && post){

loadPost(cat,post);

}else{

showCategories();

}

/* 显示栏目 */

async function showCategories(){

let html="<h1>博客栏目</h1>";

for(let key in categories){

let c=categories[key];

html+=`

<div class="category" onclick="toggle('${key}')">

<h2>${c.title}</h2>

<div class="post-list" id="list-${key}">

加载中...

</div>

</div>

`;

}

main.innerHTML=html;

/* 读取文章 */

for(let key in categories){

loadPosts(key);

}

}

/* 读取 GitHub 文章列表 */

async function loadPosts(key){

let folder=categories[key].folder;

let url=`https://api.github.com/repos/${repo}/contents/${folder}`;

let res=await fetch(url);

let data=await res.json();

let list=document.getElementById("list-"+key);

list.innerHTML="";

for(let file of data){

if(!file.name.endsWith(".md")) continue;

let name=file.name.replace(".md","");

/* 读取 markdown */

let raw=`https://raw.githubusercontent.com/${repo}/main/${folder}/${file.name}`;

let text=await fetch(raw).then(r=>r.text());

let title=name;

/* 提取标题 */

let match=text.match(/^#\s+(.*)/);

if(match){

title=match[1];

}

/* 添加链接 */

let a=document.createElement("a");

a.href=`?cat=${key}&post=${name}`;

a.innerText=title;

list.appendChild(a);

}

}

/* 展开栏目 */

function toggle(id){

let el=document.getElementById("list-"+id);

el.style.display=el.style.display==="block"?"none":"block";

}

/* 加载文章 */

async function loadPost(cat,id){

let folder=categories[cat].folder;

let url=`https://raw.githubusercontent.com/${repo}/main/${folder}/${id}.md`;

let res=await fetch(url);

let md=await res.text();

let html=marked.parse(md);

main.innerHTML=`<div id="content">${html}</div><div id="comments"></div>`;

loadComments();

}

/* 评论系统 */

function loadComments(){

const script=document.createElement("script");

script.src="https://giscus.app/client.js";

script.setAttribute("data-repo","hepsa2/mlmpm");

script.setAttribute("data-mapping","pathname");

script.setAttribute("data-category","General");

script.setAttribute("data-reactions-enabled","1");

script.setAttribute("data-theme","light");

script.setAttribute("data-lang","zh-CN");

script.async=true;

document.getElementById("comments").appendChild(script);

}

</script>

</body>
</html>
